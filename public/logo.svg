<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="AIOS">
  <defs>
    <linearGradient id="aios-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff" />
      <stop offset="55%" stop-color="#5b8def" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="aios-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28" />
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="22" y="22" width="156" height="156" rx="40" fill="url(#aios-bg)" />
  <rect x="22" y="22" width="156" height="156" rx="40" fill="url(#aios-sheen)" />

  <!-- 8-node circular network logo (monogram replacement) -->
  <circle cx="100" cy="100" r="34" fill="url(#aios-bg)" />
  <circle cx="100" cy="100" r="28" fill="none" stroke="#ffffff" stroke-width="2.5" />
  <circle cx="100" cy="100" r="34" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="100" y="106" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="17" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em">AIOS</text>

  <!-- Outer Tech Ring & Spokes -->
  <g stroke="#ffffff">
    <!-- Outer double rings -->
    <circle cx="100" cy="100" r="62" fill="none" stroke-width="1.5" opacity="0.8" />
    <circle cx="100" cy="100" r="68" fill="none" stroke-width="1" opacity="0.5" />

    <!-- 8 Radial Spokes -->
    <line x1="134" y1="100" x2="162" y2="100" stroke-width="1.5" />
    <line x1="124.04" y1="124.04" x2="143.84" y2="143.84" stroke-width="1.5" />
    <line x1="100" y1="134" x2="100" y2="162" stroke-width="1.5" />
    <line x1="75.96" y1="124.04" x2="56.16" y2="143.84" stroke-width="1.5" />
    <line x1="66" y1="100" x2="38" y2="100" stroke-width="1.5" />
    <line x1="75.96" y1="75.96" x2="56.16" y2="56.16" stroke-width="1.5" />
    <line x1="100" y1="66" x2="100" y2="38" stroke-width="1.5" />
    <line x1="124.04" y1="75.96" x2="143.84" y2="56.16" stroke-width="1.5" />

    <!-- 8 Outer Nodes (Circle + Dot) -->
    <g transform="translate(165, 100)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
    <g transform="translate(145.96, 145.96)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
    <g transform="translate(100, 165)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
    <g transform="translate(54.04, 145.96)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
    <g transform="translate(35, 100)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
    <g transform="translate(54.04, 54.04)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
    <g transform="translate(100, 35)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
    <g transform="translate(145.96, 54.04)">
      <circle cx="0" cy="0" r="8" fill="url(#aios-bg)" stroke-width="1.5" />
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
    </g>
  </g>
</svg>
